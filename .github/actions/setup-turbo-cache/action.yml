# -----------------------------------------------------------------------------
# Turbo Remote Cache Configuration
#
# Cache Access Policy
#
# +---------------------------+------------+-------------+
# | Context                   | Read Cache | Write Cache |
# +---------------------------+------------+-------------+
# | main (push)               | Yes        | Yes         |
# | Pull Requests             | Yes        | No          |
# | temp-* / hotfix-*         | Yes        | No          |
# | prod-*                    | No         | No          |
# | Fork Pull Requests        | No         | No          |
# +---------------------------+------------+-------------+
# -----------------------------------------------------------------------------

name: Setup Turbo Remote Cache

description: >
  Configure Turbo Remote Cache based on the current GitHub workflow
  context while preventing unauthorized cache writes.

inputs:
  turbo-token:
    description: Turbo Remote Cache authentication token
    required: true

  turbo-signature-key:
    description: Secret used to sign and verify remote cache artifacts
    required: true

runs:
  using: composite

  steps:
    - name: Configure Turbo Cache
      shell: bash

      env:
        TURBO_TOKEN: ${{ inputs.turbo-token }}
        TURBO_SIGNATURE_KEY: ${{ inputs.turbo-signature-key }}

        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_BASE_REF: ${{ github.base_ref }}

      run: |
        echo "::group::Turbo Cache Setup"

        echo "Branch      : $GITHUB_REF_NAME"
        echo "Event       : $GITHUB_EVENT_NAME"
        echo "Base Branch : $GITHUB_BASE_REF"

        #######################################################################
        # Skip deployment branches
        #######################################################################
        if [[ "$GITHUB_REF_NAME" == prod-* ]]; then
          echo "::notice::Deployment branch detected."
          echo "::notice::Turbo Remote Cache disabled."
          echo "::endgroup::"
          exit 0
        fi

        #######################################################################
        # Skip fork pull requests (no secrets available)
        #######################################################################
        if [[ -z "$TURBO_TOKEN" || -z "$TURBO_SIGNATURE_KEY" ]]; then
          echo "::notice::Turbo secrets unavailable."
          echo "::notice::Remote cache disabled."
          echo "::endgroup::"
          exit 0
        fi

        #######################################################################
        # Shared Turbo configuration
        #######################################################################
        {
          echo "TURBO_API=https://turbo-cache.freecodecamp.net"
          echo "TURBO_TEAM=team_freecodecamp"
          echo "TURBO_TOKEN=$TURBO_TOKEN"
          echo "TURBO_REMOTE_CACHE_SIGNATURE_KEY=$TURBO_SIGNATURE_KEY"
          echo "TURBO_TELEMETRY_DISABLED=1"
        } >> "$GITHUB_ENV"

        #######################################################################
        # Cache permissions
        #######################################################################

        if [[ "$GITHUB_REF_NAME" == "main" && "$GITHUB_EVENT_NAME" == "push" ]]; then

          echo "::notice::Turbo Cache Mode : READ + WRITE"

        else

          echo "TURBO_CACHE=local:rw,remote:r" >> "$GITHUB_ENV"

          echo "::notice::Turbo Cache Mode : READ ONLY"

        fi

        echo "::endgroup::"
