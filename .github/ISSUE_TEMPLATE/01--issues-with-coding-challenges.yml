name: Issue - Content in Our Coding Challenges

description: >
  Report issues related to a coding challenge, such as broken tests,
  incorrect solutions, typos, or unclear instructions.

type: Bug

labels:
  - scope: curriculum
  - status: waiting triage

body:
  - type: markdown
    attributes:
      value: >
        If you are reporting a security vulnerability, please **do not**
        create a GitHub issue. Instead, report it through:

        https://contribute.freecodecamp.org/#/security

  - type: textarea
    attributes:
      label: Describe the Issue
      description: >
        Provide a clear and concise description of the problem you encountered.
    validations:
      required: true

  - type: input
    attributes:
      label: Affected Challenge
      description: >
        Paste the URL of the coding challenge where the issue occurs.
      placeholder: https://www.freecodecamp.org/learn/...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Your Code
      description: >
        Paste the code you wrote inside the code block below.
      render: javascript
      value: |
        ```javascript

        ```
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: >
        Describe what you expected to happen instead.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Screenshots
      description: >
        If applicable, drag and drop screenshots here to help explain the issue.
    validations:
      required: false

  - type: textarea
    attributes:
      label: System Information
      description: >
        Please complete the following information.
      value: |
        - Device:
        - Operating System:
        - Browser:
        - Browser Version:
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional Context
      description: >
        Include any additional details that migh
