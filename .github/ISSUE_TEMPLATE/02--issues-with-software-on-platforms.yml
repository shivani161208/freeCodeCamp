name: Issue - User Interface on Our Platforms

description: >
  Report bugs related to the user interface on freeCodeCamp platforms,
  including Learn, News, Community Forum, Code Radio, or other services.

type: Bug

labels:
  - status: waiting triage

body:
  - type: markdown
    attributes:
      value: >
        If you are reporting a **security vulnerability**, please **do not**
        create a GitHub issue.

        Instead, report it here:

        https://contribute.freecodecamp.org/#/security

  - type: textarea
    attributes:
      label: Describe the Issue
      description: >
        Provide a clear and concise description of the problem.
      placeholder: Explain what happened and why it appears to be a bug.
    validations:
      required: true

  - type: input
    attributes:
      label: Affected Page
      description: >
        Paste the URL of the page where the issue occurs.
      placeholder: https://www.freecodecamp.org/...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: >
        Describe the steps needed to reproduce the issue.
      value: |
        1. Go to "..."
        2. Click on "..."
        3. Scroll to "..."
        4. Observe the issue
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: >
        Describe what you expected to happen instead.
      placeholder: The page should...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Screenshots
      description: >
        If applicable, attach screenshots or screen recordings to help explain
        the issue.
    validations:
      required: false

  - type: textarea
    attributes:
      label: System Information
      description: >
        Please provide details about your environment.
      value: |
        - Device:
        - Operating System:
        - Browser:
        - Browser Version:
    validations:
      required: true

  - type: textarea
    attributes:
      label: Additional Context
      description: >
        Include any additional information that may help reproduce or diagnose
        the issue.
      placeholder: Error messages, logs, or any other relevant details.
    validations:
      required: false
