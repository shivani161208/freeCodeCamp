name: Feature Request - Our Platforms

description: >
  Suggest a new feature or improvement for freeCodeCamp platforms,
  including Learn, News, Community Forum, Code Radio, or other services.

type: Enhancement

labels:
  - status: waiting triage

body:
  - type: textarea
    attributes:
      label: Problem Statement
      description: >
        Describe the problem or limitation that this feature would solve.
      placeholder: |
        Example:
        I find it difficult to...
        Currently, there is no way to...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: >
        Describe the feature or improvement you would like to see.
      placeholder: |
        Explain how you expect the feature to work.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives Considered
      description: >
        Describe any alternative solutions, workarounds, or features you have
        considered.
      placeholder: |
        Explain any other approaches that could solve the problem.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Benefits
      description: >
        Explain how this feature would improve the user experience.
      placeholder: |
        Example:
        - Easier navigation
        - Better accessibility
        - Faster workflow
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: >
        Include any additional details, mockups, screenshots, references,
        or related links that may help explain your request.
      placeholder: |
        Attach screenshots, diagrams, or reference links if available.
    validations:
      required: false
